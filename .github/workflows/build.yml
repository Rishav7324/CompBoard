name: Build CompBoard Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Gradle 9.3.1
      run: |
        wget -q https://services.gradle.org/distributions/gradle-9.3.1-bin.zip \
          -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /opt/gradle
        echo "/opt/gradle/gradle-9.3.1/bin" >> $GITHUB_PATH

    - name: Regenerate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version=9.3.1
        chmod +x ./gradlew

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Licenses
      run: yes | sdkmanager --licenses || true

    - name: Install SDK Components
      run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

    # ✅ FIX 1 — Release Keystore generate karo
    - name: Generate Release Keystore
      run: |
        keytool -genkey -v \
          -keystore $GITHUB_WORKSPACE/release.keystore \
          -alias compboard-key \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass CompBoard@2025 \
          -keypass CompBoard@2025 \
          -dname "CN=CompBoard,OU=Android,O=CompBoard,L=Gaya,S=Bihar,C=IN"
        echo "✅ Keystore ready: $(ls -lh $GITHUB_WORKSPACE/release.keystore)"

    # ✅ FIX 2 — google-services.json placeholder banao
    - name: Create google-services.json
      run: |
        mkdir -p app
        cat > app/google-services.json << 'EOF'
        {
          "project_info": {
            "project_number": "000000000000",
            "project_id": "compboard-app",
            "storage_bucket": "compboard-app.appspot.com"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": {
                  "package_name": "com.compboard.keyboard"
                }
              },
              "oauth_client": [],
              "api_key": [
                {
                  "current_key": "AIzaPlaceholderKeyCompBoard000000000000000"
                }
              ],
              "services": {
                "appinvite_service": {
                  "other_platform_oauth_client": []
                }
              }
            }
          ],
          "configuration_version": "1"
        }
        EOF
        echo "✅ google-services.json created"

    # ✅ Release APK build — signing inject karo
    - name: Build Release APK
      run: |
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.keystore \
          -Pandroid.injected.signing.store.password=CompBoard@2025 \
          -Pandroid.injected.signing.key.alias=compboard-key \
          -Pandroid.injected.signing.key.password=CompBoard@2025 \
          --no-daemon --stacktrace

    # APK location find karo
    - name: Find APK Files
      run: |
        echo "=== APK Files ==="
        find . -name "*.apk" -type f
        echo "=================="

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: CompBoard-Release-APK
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30